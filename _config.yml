title: Avcisec | Information Security | Pentest Diaries and much more
description: This blog contains short documentations about cybersecurity. It's a diary of a Jr.Cyber Security Researcher."
author:
  name: "Avcisec"
  email: "yasaravci@protonmail.com"
  url: "avcisec.github.io"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 3
paginate_path: /page:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap


